# ──────────────────────────────────────────────────────────────────────────────
# Example: VaultLayer escrow commit on every release tag
#
# Copy this file to your repo at:   .github/workflows/vaultlayer-commit.yml
#
# Required repository secrets (Settings → Secrets → Actions):
#   VAULTLAYER_SHELBY_PRIVATE_KEY  — hex Ed25519 private key for Shelby uploads
#   VAULTLAYER_APTOS_PRIVATE_KEY   — hex Ed25519 private key to sign Aptos txs
#   VAULTLAYER_ENCRYPTION_KEY      — 32-byte AES-256-GCM key, hex-encoded (64 chars)
#   VAULTLAYER_ENCRYPTED_KEY       — AES key encrypted with buyer's public key, hex
#
# Required repository variables (Settings → Variables → Actions):
#   VAULTLAYER_CONTRACT_ADDRESS    — deployed Aptos module address, e.g. 0xabcd…
#   VAULTLAYER_AGREEMENT_ID        — numeric escrow agreement ID from the wizard
# ──────────────────────────────────────────────────────────────────────────────

name: VaultLayer Escrow Commit

on:
  push:
    tags:
      - 'v*'           # fires on v1.0.0, v2.3.1-rc1, etc.

permissions:
  contents: read       # git archive only needs read access

jobs:
  vaultlayer-commit:
    name: Commit to VaultLayer Escrow
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git archive works correctly

      - name: Commit source code to VaultLayer escrow
        id: vaultlayer
        uses: aldidstn/Covenant/packages/github-action@main
        with:
          # ── Shelby / encryption ─────────────────────────────────────────────
          shelby-private-key:  ${{ secrets.VAULTLAYER_SHELBY_PRIVATE_KEY }}
          encryption-key:      ${{ secrets.VAULTLAYER_ENCRYPTION_KEY }}
          encrypted-key:       ${{ secrets.VAULTLAYER_ENCRYPTED_KEY }}
          shelby-api-key:      ${{ secrets.VAULTLAYER_SHELBY_API_KEY }}   # optional
          expiration-days:     '730'    # keep blobs for 2 years

          # ── Aptos contract ──────────────────────────────────────────────────
          aptos-private-key:   ${{ secrets.VAULTLAYER_APTOS_PRIVATE_KEY }}
          contract-address:    ${{ vars.VAULTLAYER_CONTRACT_ADDRESS }}
          agreement-id:        ${{ vars.VAULTLAYER_AGREEMENT_ID }}
          # aptos-node-url defaults to mainnet; override for testnet:
          # aptos-node-url: 'https://fullnode.testnet.aptoslabs.com/v1'

          # ── Blob naming ─────────────────────────────────────────────────────
          # blob-name defaults to "{github.repository}/{github.ref_name}"
          # e.g. "acme/myapp/v1.2.3" — override here if needed:
          # blob-name: 'myapp/${{ github.ref_name }}'

      - name: Print commit summary
        run: |
          echo "Blob name          : ${{ steps.vaultlayer.outputs.blob-name }}"
          echo "Content Merkle root: ${{ steps.vaultlayer.outputs.content-merkle-root }}"
          echo "Shelby Merkle root : ${{ steps.vaultlayer.outputs.shelby-merkle-root }}"
          echo "Shelby account     : ${{ steps.vaultlayer.outputs.account-address }}"
