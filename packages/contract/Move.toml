[package]
name = "covenant"
version = "0.1.0"
authors = ["Covenant"]

[addresses]
# Filled in at deploy time via `aptos move publish --named-addresses covenant=<addr>`.
# During local testing, override in [dev-addresses] below.
covenant = "_"

[dev-addresses]
covenant = "0xcafe"

[dependencies.AptosFramework]
git = "https://github.com/aptos-labs/aptos-core.git"
rev = "mainnet"
subdir = "aptos-move/framework/aptos-framework"

[dev-dependencies]
